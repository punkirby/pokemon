<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex Wiki</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Pokédex Wiki</h1>
    <p>Explora fichas completas de Pokémon usando la PokéAPI.</p>
  </header>

  <main class="container">
    <section class="controls">
      <input id="searchInput" type="search" placeholder="Buscar por nombre..." aria-label="Buscar Pokémon por nombre">
      <select id="typeFilter" aria-label="Filtrar por tipo">
        <option value="">Todos los tipos</option>
      </select>
      <select id="generationFilter" aria-label="Cantidad de Pokémon">
        <option value="151">Kanto (1-151)</option>
        <option value="251">Johto (1-251)</option>
        <option value="386">Hoenn (1-386)</option>
      </select>
      <div class="view-switch" role="tablist" aria-label="Cambiar vista">
        <button class="active" data-view="cards">Tarjetas</button>
        <button data-view="kanban">Kanban</button>
        <button data-view="table">Tabla</button>
      </div>
    </section>

    <section id="status" class="status">Cargando Pokémon...</section>

    <section id="cardsView" class="view"></section>
    <section id="kanbanView" class="view hidden"></section>
    <section id="tableView" class="view hidden"></section>
  </main>

  <dialog id="pokemonDialog">
    <article id="pokemonDetail"></article>
    <button id="closeDialog">Cerrar</button>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
